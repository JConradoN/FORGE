<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Certa Imóveis</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #D8F3DC;
      color: #081C15;
    }

    header {
      background-color: #1B4332;
      color: white;
      padding: 20px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #40916C;
      padding: 10px 20px;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      display: inline;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
    }

    .hamburger div {
      width: 25px;
      height: 3px;
      background-color: white;
      margin: 4px 0;
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      nav ul {
        display: none;
        flex-direction: column;
        width: 100%;
        background-color: #40916C;
      }

      nav ul.active {
        display: flex;
      }
    }

    #hero {
      background-color: #1B4332;
      color: white;
      padding: 50px 20px;
      text-align: center;
    }

    #imoveis {
      padding: 40px 20px;
      text-align: center;
    }

    .filtro {
      margin-bottom: 20px;
    }

    .filtro button {
      background-color: #40916C;
      color: white;
      border: none;
      padding: 10px 20px;
      margin: 0 5px;
      cursor: pointer;
    }

    .filtro button:hover {
      background-color: #1B4332;
    }

    .imovel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .imovel-card {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      width: 300px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .imovel-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 4px;
    }

    .imovel-card h3 {
      margin: 10px 0;
    }

    .imovel-card p {
      margin: 5px 0;
    }

    #sobre {
      padding: 40px 20px;
      text-align: center;
    }

    #contato {
      padding: 40px 20px;
      text-align: center;
    }

    form {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    form input, form textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    form button {
      background-color: #40916C;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
    }

    form button:hover {
      background-color: #1B4332;
    }

    .error {
      color: red;
      font-size: 0.9em;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Casa Certa Imóveis</h1>
  </header>

  <nav>
    <div class="hamburger" id="hamburger">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <ul id="nav-links">
      <li><a href="#hero">Início</a></li>
      <li><a href="#imoveis">Imóveis</a></li>
      <li><a href="#sobre">Sobre</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>

  <section id="hero">
    <h2>Encontre o seu imóvel ideal</h2>
    <p>Descubra as melhores opções de imóveis para você.</p>
    <a href="#imoveis">Ver imóveis</a>
  </section>

  <section id="imoveis">
    <div class="filtro">
      <button onclick="filterImoveis('todos')">[Todos]</button>
      <button onclick="filterImoveis('Apartamento')">[Apartamento]</button>
      <button onclick="filterImoveis('Casa')">[Casa]</button>
      <button onclick="filterImoveis('Terreno')">[Terreno]</button>
    </div>
    <div class="imovel" id="imovel-list">
      <!-- Imóveis serão carregados aqui -->
    </div>
  </section>

  <section id="sobre">
    <h2>Sobre Nós</h2>
    <p>Somos a Casa Certa Imóveis, uma agência dedicada a ajudar você a encontrar o imóvel dos seus sonhos.</p>
  </section>

  <section id="contato">
    <h2>Contato</h2>
    <form id="contact-form">
      <input type="text" id="name" placeholder="Nome" required>
      <div class="error" id="name-error"></div>
      <input type="email" id="email" placeholder="E-mail" required>
      <div class="error" id="email-error"></div>
      <textarea id="message" placeholder="Mensagem" required></textarea>
      <div class="error" id="message-error"></div>
      <button type="submit">Enviar</button>
    </form>
  </section>

  <script>
    // Carregar imóveis
    fetch('./imoveis.json')
      .then(response => response.json())
      .then(data => {
        const imovelList = document.getElementById('imovel-list');
        data.forEach(imovel => {
          const card = document.createElement('div');
          card.className = 'imovel-card';
          card.innerHTML = `
            <img src="${imovel.foto}" alt="${imovel.titulo}">
            <h3>${imovel.titulo}</h3>
            <p><strong>Tipo:</strong> ${imovel.tipo}</p>
            <p><strong>Endereço:</strong> ${imovel.endereco}</p>
            <p><strong>Preço:</strong> R$${imovel.preco.toLocaleString('pt-BR')}</p>
            <p><strong>Área:</strong> ${imovel.area_m2} m²</p>
            <p><strong>Quartos:</strong> ${imovel.quartos}</p>
          `;
          imovelList.appendChild(card);
        });
      });

    // Filtro de imóveis
    function filterImoveis(type) {
      const cards = document.querySelectorAll('.imovel-card');
      cards.forEach(card => {
        if (type === 'todos' || card.querySelector('p strong').textContent === type) {
          card.style.display = 'block';
        } else {
          card.style.display = 'none';
        }
      });
    }

    // Validação do formulário
    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      let isValid = true;

      // Limpar erros anteriores
      document.querySelectorAll('.error').forEach(el => el.textContent = '');

      if (name === '') {
        document.getElementById('name-error').textContent = 'Nome é obrigatório';
        isValid = false;
      }

      if (email === '' || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('email-error').textContent = 'E-mail inválido';
        isValid = false;
      }

      if (message === '') {
        document.getElementById('message-error').textContent = 'Mensagem é obrigatória';
        isValid = false;
      }

      if (isValid) {
        // Enviar formulário (exemplo: alerta)
        alert('Formulário enviado com sucesso!');
        this.reset();
      }
    });

    // Menu mobile
    const hamburger = document.getElementById('hamburger');
    const navLinks = document.getElementById('nav-links');

    hamburger.addEventListener('click', () => {
      navLinks.classList.toggle('active');
    });

    // Responsividade
    const mediaQuery = window.matchMedia('(max-width: 768px)');
    mediaQuery.addEventListener('change', (e) => {
      if (e.matches) {
        navLinks.classList.remove('active');
      }
    });
  </script>
</body>
</html>
